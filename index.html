<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API User Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

```
<div class="container">

    <h1>🌐 API User Explorer</h1>

    <div class="controls">
        <input
            type="text"
            id="search"
            placeholder="Search by name or company..."
        >

        <button id="themeBtn">
            🌙 Dark Mode
        </button>
    </div>

    <p id="userCount"></p>

    <p id="loading">Loading users...</p>

    <p id="error"></p>

    <div id="userContainer"></div>
    <footer>
    Data provided by JSONPlaceholder API
</footer>

</div>

<script src="script.js"></script>
```

</body>
</html>
